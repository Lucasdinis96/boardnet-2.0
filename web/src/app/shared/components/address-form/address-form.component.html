<div class="address-container" [class.disabled]="isDisabled">
    <form
        (ngSubmit)="submit()"
        [formGroup]="addressForm"
        class="address-form">
        <input 
            type="text"
            placeholder="CEP" 
            formControlName="zipcode">
        <input 
            type="text"
            placeholder="Rua" 
            formControlName="street">
        <input 
            type="text"
            placeholder="Número" 
            formControlName="number">
        <input 
            type="text"
            placeholder="Bairro" 
            formControlName="neighborhood">
        <div class="autocomplete" (blur)="isDropdownOpen = false" tabindex="0">
            <input 
            type="text"
            placeholder="Cidade" 
            formControlName="city_state"
            autocomplete="off"
            (focus)="isDropdownOpen = true">
            <ul *ngIf=" isDropdownOpen && (cities$ | async) as cities">
                <li
                    *ngFor="let city of cities"
                    (click)="selectCity(city)">
                    {{ city.name }}
                </li>

                <li *ngIf="cities.length === 0">
                    Nenhuma cidade encontrada
                </li>
            </ul>
        </div>
    </form>
</div>

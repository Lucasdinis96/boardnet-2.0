<div class="container" *ngIf = "$collection | async as boardgames">
    <div *ngFor = "let boardgame of boardgames">
        <img src="{{boardgame.boardgame.cover}}" alt="cover">
        <a [routerLink]="['/boardgame', boardgame.boardgame.id]">
            {{ boardgame.boardgame.title }}
        </a>
        <button type="submit" (click)="removeFromCollection(boardgame.collection_id)">Remover da coleção</button>
    </div>
</div>

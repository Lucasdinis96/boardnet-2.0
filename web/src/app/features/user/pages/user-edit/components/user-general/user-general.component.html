<div class="content">
    <form 
        (ngSubmit)="submit()"
        [formGroup]="userForm"
        class="general-form">
        <h2>Editar Dados</h2>
        <input 
            type="text"
            placeholder="Nome" 
            formControlName="name">
        <input 
            type="date"
            placeholder="Data de Nascimento" 
            formControlName="birthdate">
        <input 
            type="text"
            placeholder="Telefone" 
            formControlName="phone">
        <div class="formInput">
            <input type="email" placeholder="Email" formControlName="email" (blur)="onFieldBlur('email')">            
            @if (userForm.get('email')?.invalid && userForm.get('email')?.touched) {
                <div class="error-zone">
                    @if (userForm.get('email')?.hasError('required')) {
                        <span>Campo obrigatório.</span>
                    } 
                    @else if (userForm.get('email')?.hasError('email')) {
                        <span>O formato do e-mail digitado é inválido.</span>
                    }
                </div>
            }
        </div>
        <button class="send-btn" type="submit">Enviar</button>
    </form>
</div>

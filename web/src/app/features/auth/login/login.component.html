<div class="modal-backdrop">
  <div class="modal">

    <h2>Login</h2>

    <form (ngSubmit)="submit()">

      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Senha"
        required
      />

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>

      <p *ngIf="error" class="error">{{ error }}</p>

    </form>

    <button class="close" (click)="onClose()">X</button>

  </div>
</div>

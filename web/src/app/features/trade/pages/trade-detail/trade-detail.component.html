<div class="detail-container" *ngIf="trade$ | async as trade">
    <div class="info">
        <img class="cover" [src]="getPrimaryImage(trade) | tradeImagesUrl" alt="cover">
        <h1>{{ trade.title }}</h1>
        <div class="trade-detail">
            <span>Vendedor - {{ trade.user.name }}</span>
            <span>Cidade: {{ trade.user.city_state }}</span>
            <a class="btn-green" href="https://wa.me/{{ trade.user.phone }}" target="_blank">Entre em contato</a>
        </div>
        <div class="btn-yellow">
            <a class="goBack-btn" routerLink="/trades">Voltar</a>
        </div>
    </div>

    <div class="detail">
        <div class="detail-info">
            <div class="trade-description">
                <p>{{ trade.description }}</p>
            </div>
            <ng-container *ngIf="trade.images.length > 0; else none">
            <div class="photos">
                <img
                    *ngFor="let photo of trade.images"
                    [src]="photo.path | tradeImagesUrl"
                    alt="Foto"
                    (click)="openImage(photo.path)">
            </div>
        </ng-container>
        </div>
        <div class="game-section">
            Jogos a venda:
        </div>
        <div class="trade-games-grid">
            <div class="trade-games" *ngFor="let boardgames of trade.boardgames">
                <img class="game-cover" src="{{boardgames.cover}}" alt="cover">
                <span>{{ boardgames.title}}</span>
                <span>R$ {{ boardgames.trade_item.value }}</span>
                <button class="cart-btn btn-green" (click)="addCart(boardgames.trade_item.id)">Adicionar ao carrinho</button>
                <a class="btn-blue" [routerLink]="['/boardgames', boardgames.id]">Ver Jogo</a>
            </div>
        </div>
    </div>
</div>

<div class="image-modal" *ngIf="selectedImage" (click)="closeImage()">
    <img class="modal-image" [src]="selectedImage | tradeImagesUrl" alt="Imagem ampliada" (click)="$event.stopPropagation()">
</div>

<ng-template #none>
    <p class="none">Nenhuma imagem para este anúncio.</p>
</ng-template>

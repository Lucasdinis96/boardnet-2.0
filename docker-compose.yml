services:

  api:
    container_name: api
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./api:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - app-network
    depends_on:
      - db
      - redis

  web:
    container_name: web
    build:
      context: ./docker/angular
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./web:/usr/src/app
      - node_modules:/usr/src/app/node_modules
    ports:
      - "4200:4200"
    networks:
      - app-network

  nginx:
    container_name: nginx
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./api:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - api
      - web

  db:
    container_name: db
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: boardnet
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: boardnet
      MYSQL_PASSWORD: boardnet
    networks:
      - app-network

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:5.2
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - app-network

  redis:
    container_name: redis
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  node_modules: